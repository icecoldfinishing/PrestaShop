version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ps_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: prestashop
      MYSQL_USER: ps_user
      MYSQL_PASSWORD: ps_pass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  web:
    build: .
    container_name: ps_web
    depends_on:
      - db
    ports:
      - "8088:80"
    environment:
      DB_SERVER: db
      DB_NAME: prestashop
      DB_USER: ps_user
      DB_PASSWD: ps_pass
      PS_DOMAIN: localhost:8088
    volumes:
      - prestashop_data:/var/www/html

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ps_pma
    restart: always
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: admin

volumes:
  db_data:
  prestashop_data: